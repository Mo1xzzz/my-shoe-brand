<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurea Luxe - Premium Footwear</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>Aurea Luxe</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link active">Home</a></li>
                <li><a href="products.html" class="nav-link">Products</a></li>
                <li><a href="#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Crafted for Royalty</h1>
            <p class="hero-subtitle">Experience unparalleled luxury with our premium footwear collection. Every step, a statement.</p>
            <a href="products.html" class="cta-button">
                <span>Shop Now</span>
                <i class="fas fa-arrow-right"></i>
            </a>
        </div>
        <div class="hero-image">
            <div class="hero-shoe"></div>
        </div>
    </section>

    <!-- Featured Products -->
    <section class="featured">
        <div class="container">
            <h2 class="section-title">Featured Collection</h2>
            <div class="products-grid" id="featured-products">
                <!-- Products loaded by JavaScript -->
            </div>
            <div class="section-cta">
                <a href="products.html" class="cta-button secondary">
                    View All Products
                </a>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="contact" id="contact">
        <div class="container">
            <h2 class="section-title">Get in Touch</h2>
            <div class="contact-links">
                <a href="https://wa.me/1234567890?text=Hi%20Aurea%20Luxe%2C%20I'd%20like%20to%20order" class="contact-link whatsapp" target="_blank">
                    <i class="fab fa-whatsapp"></i>
                    <span>Order on WhatsApp</span>
                </a>
                <a href="https://instagram.com/aurealuxe" class="contact-link instagram" target="_blank">
                    <i class="fab fa-instagram"></i>
                    <span>Follow on Instagram</span>
                </a>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
